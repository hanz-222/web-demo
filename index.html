<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Well | Make a Wish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden font-sans">

    <!-- Star Background -->
    <div id="stars-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <main class="relative z-10 w-full max-w-md p-8 bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl shadow-2xl mx-4">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-light tracking-widest text-indigo-300 mb-2">WISH</h1>
            <p class="text-sm text-gray-400 italic">Whisper it to the digital void.</p>
        </header>

        <section>
            <textarea 
                id="wishInput"
                placeholder="What does your heart desire?" 
                class="w-full h-32 p-4 bg-black/20 border border-white/10 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all resize-none text-white placeholder-gray-500"
            ></textarea>
            
            <button 
                onclick="castWish()"
                class="w-full mt-6 py-3 px-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-medium rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg"
            >
                Cast into the Universe
            </button>
        </section>

        <footer id="message" class="mt-6 text-center text-sm text-indigo-400 opacity-0 transition-opacity duration-500">
            Your wish has been received by the stars.
        </footer>
    </main>

    <script>
        // Generate stars randomly
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }

        function castWish() {
            const input = document.getElementById('wishInput');
            const message = document.getElementById('message');
            
            if (input.value.trim() !== "") {
                // In a real app, you'd send this to a database here
                console.log("Wish cast:", input.value);
                
                input.value = "";
                message.style.opacity = "1";
                
                setTimeout(() => {
                    message.style.opacity = "0";
                }, 4000);
            }
        }
    </script>
</body>
</html>
